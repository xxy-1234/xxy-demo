<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>管理后台 · 用户管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <th:block th:replace="~{fragments/theme-init :: snippet}"></th:block>
</head>
<body class="page-admin">
<div class="admin-app">
    <aside th:replace="~{fragments/admin-sidebar :: sidebar ('users')}"></aside>
    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <h1>用户管理</h1>
                <p class="sub">创建账号、启用/禁用、重置密码、分配角色（不可取消自己的管理员身份）</p>
            </div>
        </header>
        <main class="admin-content">
            <div class="flash ok" th:if="${success}" th:text="${success}"></div>
            <div class="flash err" th:if="${error}" th:text="${error}"></div>

            <section class="app-card" style="margin-bottom:1.25rem;">
                <h2 style="margin:0 0 1rem;font-size:1.05rem;">创建新用户</h2>
                <form th:action="@{/admin/users}" method="post" th:object="${createForm}">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" th:field="*{username}" required autocomplete="off"/>
                        </div>
                        <div class="form-group">
                            <label for="password">初始密码</label>
                            <input type="password" id="password" th:field="*{password}" required/>
                        </div>
                        <div class="form-group">
                            <label for="role">角色</label>
                            <select id="role" th:field="*{role}">
                                <option value="USER">普通用户</option>
                                <option value="ADMIN">管理员</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">创建用户</button>
                </form>
            </section>

            <section class="app-card">
                <h2 style="margin:0 0 1rem;font-size:1.05rem;">用户列表</h2>
                <div style="overflow-x:auto;">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th style="min-width:220px;">操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.username}">name</td>
                            <td>
                                <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post"
                                      style="display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center;">
                                    <select name="role" style="width:auto;min-width:110px;">
                                        <option value="USER" th:selected="${user.role.name() == 'USER'}">USER</option>
                                        <option value="ADMIN" th:selected="${user.role.name() == 'ADMIN'}">ADMIN</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-ghost">保存角色</button>
                                </form>
                            </td>
                            <td>
                                <span class="badge on" th:if="${user.enabled}">启用</span>
                                <span class="badge off" th:unless="${user.enabled}">禁用</span>
                            </td>
                            <td>
                                <div style="display:flex;flex-direction:column;gap:0.45rem;">
                                    <div style="display:flex;flex-wrap:wrap;gap:0.35rem;">
                                        <form th:if="${user.enabled}" th:action="@{/admin/users/{id}/disable(id=${user.id})}"
                                              method="post" style="display:inline;">
                                            <button type="submit" class="btn btn-sm btn-danger"
                                                    onclick="return confirm('确定禁用该用户？');">禁用</button>
                                        </form>
                                        <form th:unless="${user.enabled}" th:action="@{/admin/users/{id}/enable(id=${user.id})}"
                                              method="post" style="display:inline;">
                                            <button type="submit" class="btn btn-sm btn-primary">启用</button>
                                        </form>
                                    </div>
                                    <form th:action="@{/admin/users/{id}/password(id=${user.id})}" method="post"
                                          style="display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center;">
                                        <input type="password" name="newPassword" placeholder="新密码" required minlength="6" maxlength="80"
                                               style="max-width:160px;"/>
                                        <button type="submit" class="btn btn-sm btn-ghost">重置密码</button>
                                    </form>
                                    <form th:if="${user.role.name() == 'USER'}"
                                          th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                                        <button type="submit" class="btn btn-sm btn-danger"
                                                onclick="return confirm('将删除该用户及其全部留言与回复，确定？');">删除用户</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
