<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>注册 · 留言板系统</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <th:block th:replace="~{fragments/theme-init :: snippet}"></th:block>
</head>
<body class="page-auth">
<div class="auth-layout">
    <aside class="auth-aside" aria-hidden="true">
        <div class="auth-aside-inner">
            <p class="auth-aside-kicker">新用户</p>
            <h2 class="auth-aside-title">加入留言板<br/>参与讨论</h2>
            <p class="auth-aside-desc">注册后即可发布主贴、回复他人，并在个人中心管理自己的内容与资料。</p>
            <ul class="auth-aside-dots">
                <li>用户名用于登录，昵称用于展示</li>
                <li>注册完成即可使用全部互动功能</li>
            </ul>
        </div>
    </aside>
    <main class="auth-main">
        <div class="auth-main-inner">
            <div class="auth-theme-bar">
                <button type="button" class="btn-theme-nav" data-theme-toggle>切换为浅色</button>
            </div>
        <div class="app-card auth-card">
            <div class="auth-card-head">
                <span class="auth-brand-dot"></span>
                <div>
                    <h1 class="auth-title">创建账号</h1>
                    <p class="auth-subtitle">填写账号、昵称与邮箱完成注册</p>
                </div>
            </div>

            <div class="flash ok" th:if="${success}" th:text="${success}"></div>
            <div class="flash err" th:if="${error}" th:text="${error}"></div>

            <form class="auth-form" th:action="@{/register}" method="post" th:object="${registerForm}">
                <div class="form-group">
                    <label for="username">用户名（登录用，字母数字下划线）</label>
                    <input type="text" id="username" th:field="*{username}" required autocomplete="username"/>
                    <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>
                <div class="form-group">
                    <label for="nickname">昵称（展示名称）</label>
                    <input type="text" id="nickname" th:field="*{nickname}" required maxlength="64" autocomplete="nickname"/>
                    <div class="field-error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}"></div>
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" th:field="*{email}" required autocomplete="email"/>
                    <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" th:field="*{password}" required autocomplete="new-password"/>
                    <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required autocomplete="new-password"/>
                    <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>
                <div class="field-error" th:if="${#fields.hasGlobalErrors()}">
                    <span th:each="err : ${#fields.errors('global')}" th:text="${err}">错误</span>
                </div>
                <button type="submit" class="btn btn-primary btn-block auth-submit">注册</button>
            </form>

            <div class="auth-links">
                <p>已有账号？ <a th:href="@{/login}">去登录</a></p>
                <p class="auth-links-row">
                    <a th:href="@{/}">返回留言板</a>
                    <span class="auth-dot">·</span>
                    <a th:href="@{/help}">功能说明</a>
                </p>
            </div>
        </div>
        </div>
    </main>
</div>
<script defer th:src="@{/js/theme.js}"></script>
</body>
</html>
