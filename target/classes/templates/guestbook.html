<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${appName}">留言板</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <th:block th:replace="~{fragments/theme-init :: snippet}"></th:block>
</head>
<body class="page-guestbook">
<div class="wrap">
    <nav class="top-nav top-nav-rect">
        <div class="top-nav-brand">
            <span class="top-nav-logo" aria-hidden="true"></span>
            <span class="top-nav-title" th:text="${appName}">留言板</span>
        </div>
        <div class="top-nav-end">
            <div class="nav-links">
                <a class="nav-pill is-active" th:href="@{/}">首页</a>
                <a class="nav-pill" th:href="@{/help}">功能说明</a>
                <a class="nav-pill" th:href="@{/login}" sec:authorize="!isAuthenticated()">登录</a>
                <a class="nav-pill nav-pill-accent" th:href="@{/admin/login}" sec:authorize="!isAuthenticated()">管理员</a>
                <a class="nav-pill" th:href="@{/register}" sec:authorize="!isAuthenticated()">注册</a>
                <a class="nav-pill" th:href="@{/profile}" sec:authorize="isAuthenticated()">个人中心</a>
                <a class="nav-pill nav-pill-accent" th:href="@{/admin}" sec:authorize="hasRole('ADMIN')">管理后台</a>
            </div>
            <button type="button" class="btn-theme-nav" data-theme-toggle>切换为浅色</button>
            <div class="nav-user" sec:authorize="isAuthenticated()">
                <span class="nav-user-avatar" th:replace="~{fragments/avatar :: face(${#authentication.principal.user}, ${#authentication.principal.user.nickname})}"></span>
                <span class="nav-greeting">你好，<strong sec:authentication="name">user</strong></span>
                <form th:action="@{/logout}" method="post" class="nav-logout-form">
                    <button type="submit" class="btn btn-sm btn-danger">退出</button>
                </form>
            </div>
        </div>
    </nav>

    <header class="page-head guestbook-hero guestbook-hero-brand">
        <div class="header-left">
            <div class="hero-chip-row">
                <span class="topic-badge hero-chip" th:text="${appName}">留言板</span>
                <span class="topic-badge hero-chip hero-chip-muted" th:text="${projectTitle}">在线留言</span>
            </div>
            <div class="hero-title-row">
                <span class="hero-deco" aria-hidden="true"></span>
                <h1 class="hero-main-title" th:text="${appName}">留言板</h1>
                <span class="hero-deco hero-deco-right" aria-hidden="true"></span>
            </div>
            <p class="lead hero-tagline">分享观点 · 分类讨论 · 搜索与置顶 · 全站公告</p>
        </div>
    </header>

    <div class="app-card card-announcements" th:if="${!#lists.isEmpty(announcements)}">
        <h2 class="card-announcements-title">全站公告</h2>
        <div class="announcement-item" th:each="a : ${announcements}">
            <div class="announcement-head">
                <strong th:text="${a.title}">标题</strong>
                <span class="meta" th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd HH:mm', 'Asia/Shanghai')}">时间</span>
            </div>
            <div class="announcement-body meta" th:text="${a.content}">正文</div>
        </div>
    </div>

    <div class="app-card" style="margin-bottom:1rem;">
        <form method="get" th:action="@{/}" class="toolbar" style="margin:0;">
            <div class="form-group grow">
                <label for="q">搜索标题或正文</label>
                <input id="q" name="q" type="text" th:value="${q}" placeholder="关键词…"/>
            </div>
            <div class="form-group" style="min-width:160px;">
                <label for="cat">分类</label>
                <select id="cat" name="cat">
                    <option value="" th:selected="${cat == null or #strings.isEmpty(cat)}">全部分类</option>
                    <option th:each="c : ${categories}" th:value="${c.name()}" th:text="${c.label}"
                            th:selected="${cat != null and #strings.equals(cat, c.name())}">分类</option>
                </select>
            </div>
            <input type="hidden" name="page" value="0"/>
            <input type="hidden" name="size" th:value="${threads.size}"/>
            <button type="submit" class="btn btn-primary" style="height:fit-content;">搜索</button>
            <a class="btn btn-ghost" style="height:fit-content;" th:href="@{/(size=${threads.size})}">重置</a>
        </form>
    </div>

    <div class="app-card">
        <div class="flash ok" th:if="${success}" th:text="${success}"></div>
        <div class="flash err" th:if="${error}" th:text="${error}"></div>

        <form class="composer" th:action="@{/messages}" th:object="${newThreadForm}" method="post" sec:authorize="isAuthenticated()">
            <input type="hidden" name="page" th:value="${threads.number}"/>
            <input type="hidden" name="size" th:value="${threads.size}"/>
            <input type="hidden" name="q" th:value="${q}"/>
            <input type="hidden" name="cat" th:value="${cat}"/>
            <div class="form-grid" style="grid-template-columns:1fr 1fr;">
                <div class="form-group">
                    <label for="title">标题</label>
                    <input id="title" type="text" th:field="*{title}" maxlength="160" placeholder="留言标题" autocomplete="off"/>
                    <div class="field-error" style="color:var(--err);font-size:0.8rem;" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>
                <div class="form-group">
                    <label for="category">分类</label>
                    <select id="category" th:field="*{category}">
                        <option th:each="c : ${categories}" th:value="${c.name()}" th:text="${c.label}">分类</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="content">留言内容（支持 emoji 直接粘贴）</label>
                <textarea id="content" th:field="*{content}" maxlength="2000" placeholder="正文…"></textarea>
                <div class="field-error" style="color:var(--err);font-size:0.8rem;" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
            </div>
            <div class="row">
                <button type="submit" class="btn btn-primary">发布主贴</button>
                <span class="meta">以 <strong sec:authentication="name">用户</strong> 身份发布</span>
            </div>
        </form>

        <div class="guest-login-hint" sec:authorize="!isAuthenticated()">
            未登录仅可浏览。<a th:href="@{/login}">登录</a> 或 <a th:href="@{/register}">注册</a> 后发帖与回复。
        </div>

        <div th:if="${threads.totalElements == 0}" class="meta" style="margin:0.75rem 0 0;">没有符合条件的留言。</div>

        <article class="thread" th:each="thread : ${threads.content}">
            <div class="thread-header">
                <div class="root-head">
                    <div>
                        <span class="badge user" th:text="${thread.root.category != null ? thread.root.category.label : ''}">分类</span>
                        <span class="badge admin" th:if="${thread.root.pinned}">置顶</span>
                        <span class="badge off" th:if="${thread.root.blocked}">已屏蔽</span>
                        <h2 style="margin:0.35rem 0 0;font-size:1.1rem;">
                            <a th:href="@{/messages/{id}(id=${thread.root.id})}" th:text="${thread.root.title}">标题</a>
                        </h2>
                        <div class="meta author-line" style="margin-top:0.25rem;">
                            <span th:replace="~{fragments/avatar :: face(${thread.root.authorUser}, ${thread.root.author})}"></span>
                            <span class="author" th:text="${thread.root.author}">作者</span>
                            · <span th:text="${#temporals.format(thread.root.createdAt, 'yyyy-MM-dd HH:mm', 'Asia/Shanghai')}">时间</span>
                            · 浏览 <span th:text="${thread.root.viewCount}">0</span>
                            · 点赞 <span th:text="${thread.likeCount}">0</span>
                        </div>
                    </div>
                </div>
                <div class="thread-actions">
                    <form sec:authorize="isAuthenticated()" th:action="@{/messages/{id}/like(id=${thread.root.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="page" th:value="${threads.number}"/>
                        <input type="hidden" name="size" th:value="${threads.size}"/>
                        <input type="hidden" name="q" th:value="${q}"/>
                        <input type="hidden" name="cat" th:value="${cat}"/>
                        <button type="submit" class="like-btn" th:classappend="${thread.likedByCurrentUser} ? ' liked'">
                            <span th:text="${thread.likedByCurrentUser} ? '已赞' : '点赞'">点赞</span>
                        </button>
                    </form>
                    <form sec:authorize="isAuthenticated()"
                          th:if="${#authorization.expression('hasRole(''ADMIN'')') or (thread.root.author == #authentication.principal.user.nickname) or (thread.root.author == #authentication.principal.username)}"
                          th:action="@{/messages/{id}/delete(id=${thread.root.id})}" method="post" style="display:inline;">
                        <input type="hidden" name="page" th:value="${threads.number}"/>
                        <input type="hidden" name="size" th:value="${threads.size}"/>
                        <input type="hidden" name="q" th:value="${q}"/>
                        <input type="hidden" name="cat" th:value="${cat}"/>
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('确定删除该主贴及全部回复？');">删除</button>
                    </form>
                </div>
            </div>
            <p class="content meta" th:text="${#strings.abbreviate(thread.root.content, 220)}">摘要</p>

            <div class="replies" th:if="${!#lists.isEmpty(thread.replies)}">
                <div class="reply" th:each="r : ${thread.replies}">
                    <div class="reply-meta">
                        <span class="reply-author-row">
                            <span th:replace="~{fragments/avatar :: face(${r.authorUser}, ${r.author})}"></span>
                            <strong th:text="${r.author}">回复人</strong>
                        </span>
                        · <span th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm', 'Asia/Shanghai')}">时间</span>
                        <span style="float:right;">
                            <form sec:authorize="isAuthenticated()"
                                  th:if="${#authorization.expression('hasRole(''ADMIN'')') or (r.author == #authentication.principal.user.nickname) or (r.author == #authentication.principal.username)}"
                                  th:action="@{/messages/{id}/delete(id=${r.id})}" method="post" style="display:inline;">
                                <input type="hidden" name="page" th:value="${threads.number}"/>
                                <input type="hidden" name="size" th:value="${threads.size}"/>
                                <input type="hidden" name="q" th:value="${q}"/>
                                <input type="hidden" name="cat" th:value="${cat}"/>
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('删除该回复？');">删除</button>
                            </form>
                        </span>
                    </div>
                    <div style="white-space:pre-wrap;" th:text="${#strings.abbreviate(r.content, 160)}">回复</div>
                </div>
            </div>

            <form class="reply-form" th:action="@{/messages/{id}/replies(id=${thread.root.id})}" method="post" sec:authorize="isAuthenticated()">
                <input type="hidden" name="page" th:value="${threads.number}"/>
                <input type="hidden" name="size" th:value="${threads.size}"/>
                <input type="hidden" name="q" th:value="${q}"/>
                <input type="hidden" name="cat" th:value="${cat}"/>
                <label th:for="${'ra-' + thread.root.id}">快速回复</label>
                <textarea th:id="${'ra-' + thread.root.id}" name="content" maxlength="2000" placeholder="写回复…" style="min-height:72px;"></textarea>
                <button type="submit" class="btn btn-primary" style="width:fit-content;">发表回复</button>
            </form>
        </article>

        <nav class="pager" th:if="${threads.totalPages > 1}">
            <a th:if="${!threads.first}"
               th:href="@{/(page=${threads.number - 1}, size=${threads.size}, q=${q}, cat=${cat})}">上一页</a>
            <span th:if="${threads.first}" style="color:#64748b;font-weight:600;">上一页</span>
            <span class="meta">第 <span th:text="${threads.number + 1}">1</span> / <span th:text="${threads.totalPages}">1</span> 页</span>
            <a th:if="${!threads.last}"
               th:href="@{/(page=${threads.number + 1}, size=${threads.size}, q=${q}, cat=${cat})}">下一页</a>
            <span th:if="${threads.last}" style="color:#64748b;font-weight:600;">下一页</span>
        </nav>
    </div>

    <footer class="guestbook-footer meta">
        开发环境首次空库会自动创建管理员账号；具体用户名与初始密码以配置文件为准，详见「功能说明」。登录后请及时修改密码。
    </footer>
</div>
<script defer th:src="@{/js/theme.js}"></script>
</body>
</html>
