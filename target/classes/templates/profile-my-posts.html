<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>我的留言</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <th:block th:replace="~{fragments/theme-init :: snippet}"></th:block>
</head>
<body class="page-profile">
<div class="profile-container">
    <div class="help-toolbar top-nav-rect profile-toolbar">
        <div class="nav-links">
            <a th:href="@{/profile}">个人中心</a>
            <a th:href="@{/}">留言板</a>
        </div>
        <button type="button" class="btn-theme-nav" data-theme-toggle>切换为浅色</button>
    </div>
    <header class="app-card profile-page-head">
        <h1>我的主贴</h1>
        <p class="lead">在此查看您发布过的主贴标题与摘要。</p>
    </header>
    <div th:if="${#lists.isEmpty(roots)}" class="meta">暂无主贴。</div>
    <div class="app-card" style="margin-bottom:0.75rem;" th:each="m : ${roots}">
        <div class="meta" th:text="${#temporals.format(m.createdAt, 'yyyy-MM-dd HH:mm', 'Asia/Shanghai')}">时间</div>
        <h2 style="margin:0.35rem 0;font-size:1.1rem;">
            <a th:href="@{/messages/{id}(id=${m.id})}" th:text="${m.title}">标题</a>
        </h2>
        <p class="meta" th:text="${#strings.abbreviate(m.content, 120)}">摘要</p>
    </div>
</div>
<script defer th:src="@{/js/theme.js}"></script>
</body>
</html>
