# ========== MySQL（持久化用户与留言；重启后数据仍在）==========
# 请先创建数据库（示例）：
#   CREATE DATABASE xxy_guestbook CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
# 可通过环境变量覆盖连接：MYSQL_URL、MYSQL_USER、MYSQL_PASSWORD
spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/xxy_guestbook?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# 首次空库启动时创建默认管理员（生产请使用强口令或环境变量注入）
app.security.bootstrap-admin-password=ChangeMeAdmin123
