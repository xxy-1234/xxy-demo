name: Java CI/CD with GitHub Actions (Aliyun)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build and Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: mvn -B clean verify

  deploy:
    name: Deploy to Aliyun ECS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build jar
        run: mvn -B clean package -DskipTests

      # 用 ssh-agent 加载私钥，避免 appleboy 的 key 解析问题
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      # 创建目录并复制 jar
      - name: Copy jar to Aliyun
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $ALIYUN_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -o StrictHostKeyChecking=no $ALIYUN_USER@$ALIYUN_HOST "mkdir -p /root/xxy-demo"
          scp -o StrictHostKeyChecking=no target/xxy-demo-0.0.1-SNAPSHOT.jar $ALIYUN_USER@$ALIYUN_HOST:/root/xxy-demo/

      # 在阿里云服务器上重启 Spring Boot 应用
      - name: Restart app on Aliyun
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $ALIYUN_USER@$ALIYUN_HOST '
            mkdir -p /root/xxy-demo
            cd /root/xxy-demo
            pkill -f "xxy-demo-0.0.1-SNAPSHOT.jar" || true
            nohup java -jar xxy-demo-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
          '

