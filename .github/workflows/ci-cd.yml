name: Java CI/CD with GitHub Actions (Aliyun)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build and Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: mvn -B clean verify

  deploy:
    name: Deploy to Aliyun ECS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build jar
        run: mvn -B clean package -DskipTests

      # 将私钥写入文件，去掉可能的 Windows 换行符，避免 "no key found"
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/private_key
          chmod 600 ~/.ssh/private_key

      # 把打好的 jar 复制到阿里云服务器指定目录
      - name: Copy jar to Aliyun
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key_path: ~/.ssh/private_key
          source: "target/xxy-demo-0.0.1-SNAPSHOT.jar"
          target: "/root/xxy-demo"

      # 在阿里云服务器上重启 Spring Boot 应用（简单版）
      - name: Restart app on Aliyun
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key_path: ~/.ssh/private_key
          script: |
            mkdir -p /root/xxy-demo
            cd /root/xxy-demo
            # 先杀掉旧进程（如果有）
            pkill -f "xxy-demo-0.0.1-SNAPSHOT.jar" || true
            # 后台启动新版本
            nohup java -jar xxy-demo-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

