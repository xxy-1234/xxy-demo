name: Java CI/CD with GitHub Actions (Aliyun)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build and Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: mvn -B clean verify

  deploy:
    name: Deploy to Aliyun ECS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build jar
        run: mvn -B clean package -DskipTests

      # 用 ssh-agent 加载私钥，避免 appleboy 的 key 解析问题
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      # 创建目录并复制 jar + systemd 单元（推荐：ECS 上准备 /root/xxy-demo/xxy-demo.env，用 systemctl 稳定重启）
      - name: Copy jar and unit to Aliyun
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $ALIYUN_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -o StrictHostKeyChecking=no $ALIYUN_USER@$ALIYUN_HOST "mkdir -p /root/xxy-demo"
          scp -o StrictHostKeyChecking=no target/xxy-demo-0.0.1-SNAPSHOT.jar $ALIYUN_USER@$ALIYUN_HOST:/root/xxy-demo/
          scp -o StrictHostKeyChecking=no deploy/xxy-demo.service $ALIYUN_USER@$ALIYUN_HOST:/tmp/xxy-demo.service
          scp -o StrictHostKeyChecking=no deploy/ecs-restart.sh $ALIYUN_USER@$ALIYUN_HOST:/tmp/ecs-restart.sh

      # 用独立脚本在 ECS 上重启，避免超长一行 ssh 引号问题；失败时 journalctl / app.log 会打印到 Actions 日志
      - name: Restart app on Aliyun
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          MH="${MYSQL_HOST:-127.0.0.1}"
          MPORT="${MYSQL_PORT:-3306}"
          MDB="${MYSQL_DATABASE:-xxy_guestbook}"
          MUSER="${MYSQL_USER:-root}"
          MPW="${MYSQL_PASSWORD}"
          ssh -o StrictHostKeyChecking=no $ALIYUN_USER@$ALIYUN_HOST "chmod +x /tmp/ecs-restart.sh && export MYSQL_HOST='${MH}' MYSQL_PORT='${MPORT}' MYSQL_DATABASE='${MDB}' MYSQL_USER='${MUSER}' MYSQL_PASSWORD='${MPW}' && bash /tmp/ecs-restart.sh"

